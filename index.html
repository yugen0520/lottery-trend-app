<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>走势数据编辑器</title>
    <meta name="theme-color" content="#f43b46" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="走势编辑" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <div>
          <label class="label" for="chartSelect">当前表</label>
          <select id="chartSelect">
            <option value="排列三-基本走势">排列三</option>
            <option value="福彩3D-基本走势">福彩3D</option>
          </select>
        </div>
        <div class="toolbar-actions">
          <button id="drawButton" class="ghost active" type="button">画线开</button>
          <button id="exportButton" class="ghost" type="button">导出</button>
          <button id="importButton" class="ghost" type="button">导入</button>
        </div>
      </header>

      <section class="install-tip" id="installTip">
        <strong>可装到手机桌面</strong>
        <span>浏览器菜单里选择“添加到主屏幕”。</span>
      </section>

      <section class="chart-tools">
        <button id="addButton" class="primary" type="button">新增空白行</button>
        <button data-period="20" class="period active" type="button">20期</button>
        <button data-period="30" class="period" type="button">30期</button>
        <button data-period="50" class="period" type="button">50期</button>
        <button id="deleteLastButton" class="period danger" type="button">删最后一期</button>
        <button id="clearButton" class="period danger" type="button">恢复初始</button>
      </section>

      <section class="chart-card">
        <div class="hint">像 Excel 一样用：点“新增空白行”，在表格最后一行填期次和奖号，红点和和值会自动出来。</div>
        <div class="chart-scroll" id="chartScroll">
          <div class="trend-table" id="trendTable">
            <div id="gridLayer"></div>
            <svg id="trendLines" class="trend-lines" aria-hidden="true"></svg>
          </div>
        </div>
      </section>

      <div class="toast" id="toast"></div>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
